name: Bug Report
description: Report a problem with a skill, script, or the CLAUDE.md template
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: How can we trigger this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLAUDE.md template
        - Skill (specify in description)
        - Script (slackbot-send, job-fetch)
        - install.sh
        - Other
    validations:
      required: true
